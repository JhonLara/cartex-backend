server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: cartex-backend

  datasource:
    url: jdbc:h2:mem:cartex_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

external:
  api:
    auth-url: ${EXTERNAL_API_AUTH_URL:https://security.sadmin.net/security/login}
    reports-base-url: ${EXTERNAL_API_REPORTS_BASE_URL:https://reports.sadmin.net/api}

sadmin:
  unomasuno:
    username: ${SADMIN_UNOMASUNO_USERNAME:}
    password: ${SADMIN_UNOMASUNO_PASSWORD:}
